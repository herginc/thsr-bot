# =============================================================================
# booking_schedule.yaml — 訂票頻率排程配置
# =============================================================================
#
# 【規則優先順序】(數字越小越優先)
#   1. stop_before_departure  — 出發前 N 分鐘內，停止訂票
#   2. night_window           — 每日凌晨特殊時段，立刻搶票（delay = 0）
#   3. departure_near         — 距出發時間 ≤ threshold_minutes，立刻搶票
#   4. departure_far          — 距出發時間 > threshold_minutes，加 delay
#
# 【delay 說明】
#   delay_seconds = 0   → 不等待，立刻進行下一次訂票
#   delay_seconds = N   → 兩次訂票之間等待 N 秒
#
# 【time 格式】HH:MM（24 小時制，台灣 CST UTC+8）
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 停止訂票門檻
#    距出發時間 <= stop_before_departure_minutes 分鐘時，停止嘗試訂票
# -----------------------------------------------------------------------------
stop_before_departure_minutes: 5

# -----------------------------------------------------------------------------
# 2. 凌晨高速搶票時段（每日固定）
#    在此時段內，無論距出發時間多久，delay = 0（全速搶票）
# -----------------------------------------------------------------------------
night_boost_window:
  enabled: true
  start_time: "01:30"   # 凌晨 1:30
  end_time:   "02:30"   # 凌晨 2:30
  delay_seconds: 0      # 不等待，全速搶票

# -----------------------------------------------------------------------------
# 3. 距出發時間近（優先規則）
#    距出發時間 <= near_threshold_minutes → delay = near_delay_seconds
# -----------------------------------------------------------------------------
departure_near:
  near_threshold_minutes: 120   # 2 小時內
  delay_seconds: 0              # 不等待，全速搶票

# -----------------------------------------------------------------------------
# 4. 距出發時間遠（一般規則）
#    距出發時間 > near_threshold_minutes → delay = far_delay_seconds
# -----------------------------------------------------------------------------
departure_far:
  delay_seconds: 60             # 等待 60 秒再重試
