<!DOonCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>高鐵訂票系統</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: "Noto Sans TC", Arial, sans-serif; background: #f7f7fa; margin: 0; padding: 0; }
        header { background: #1565c0; color: #fff; padding: 1.5rem 0; text-align: center; letter-spacing: 0.1em; font-size: 2rem; margin-bottom: 2rem; box-shadow: 0 2px 8px #ccc; }
        
        /* 容器寬度響應式 */
        .container { max-width: 1100px; width: 95%; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px #ddd; padding: 2rem 1.5rem 2.5rem 1.5rem; }
        
        h2, h3 { color: #1565c0; margin-top: 0; border-bottom: 2px solid #e3f2fd; padding-bottom: 0.5rem; }
        
        /* 歸檔提示文字樣式 */
        .archive-note { font-size: 0.85rem; color: #666; margin-bottom: 1rem; margin-top: -0.5rem; background: #fffde7; padding: 8px; border-left: 4px solid #fbc02d; border-radius: 4px; }

        /* 表單布局 */
        form { width: 100%; }
        .form-row { display: flex; width: 100%; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem; }
        .row-top { justify-content: space-between; border-bottom: 1px dashed #eee; padding-bottom: 1.5rem; } 
        .row-bottom { flex-wrap: wrap; align-items: center; gap: 1rem; } 

        .left-group { display: flex; gap: 1.5rem; align-items: center; }
        .right-group { display: flex; align-items: center; }

        form label { display: flex; flex-direction: column; font-weight: bold; color: #333; font-size: 0.95rem; min-width: 140px; }
        
        /* 水平排列標籤樣式 (電腦版) */
        .label-horizontal { flex-direction: row !important; align-items: center; gap: 0.8rem; min-width: auto; }
        .label-horizontal span { margin-top: 0 !important; white-space: nowrap; }

        form input, form select { margin-top: 0.4rem; padding: 0.6rem; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; background-color: #fff; width: 100%; box-sizing: border-box; }
        .label-horizontal select, .label-horizontal .radio-group { margin-top: 0; }

        input:disabled, select:disabled { background-color: #e9ecef !important; cursor: not-allowed; color: #adb5bd; }

        /* 按鈕樣式 */
        .submit-btn { background: #1565c0; color: #fff; border: none; padding: 0.7rem 1.5rem; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: background 0.3s; font-weight: bold; height: 45px; min-width: 120px; }
        .submit-btn:hover { background: #0d47a1; }

        .secondary-btn { background: #607d8b; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 5px; cursor: pointer; font-size: 0.9rem; transition: background 0.3s; height: 40px; white-space: nowrap; font-weight: bold; }
        .secondary-btn:hover { background: #455a64; }

        /* 表格響應式 - 欄位變多，增加最小寬度 */
        .table-container { width: 100%; overflow-x: auto; margin-top: 1rem; border: 1px solid #eee; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: #fff; font-size: 0.85rem; min-width: 950px; }
        th, td { text-align: left; padding: 0.8rem; border-bottom: 1px solid #eee; vertical-align: top; }
        th { background-color: #f1f8ff; color: #1565c0; white-space: nowrap; }
        
        .status-pending { color: #f57c00; font-weight: bold; }
        .status-running { color: #1976d2; font-weight: bold; }
        .status-cancelling { color: #7b1fa2; font-weight: bold; }
        .status-success { color: #388e3c; font-weight: bold; }
        .status-failed { color: #d32f2f; font-weight: bold; }
        .status-cancelled { color: #9e9e9e; font-weight: bold; }
        .status-booking_success { color: #388e3c; font-weight: bold; }
        .status-booking_failed { color: #d32f2f; font-weight: bold; }
        .status-task_cancelled { color: #9e9e9e; font-weight: bold; }
        .status-task_aborted { color: #795548; font-weight: bold; }
        .status-task_deleted { color: #9e9e9e; font-weight: bold; }
        .status-unknown_result { color: #e65100; font-weight: bold; }
        
        .radio-group { display: flex; gap: 1rem; align-items: center; border: 1px solid #eee; padding: 0.4rem 0.8rem; border-radius: 5px; background: #fff; }
        .radio-group label { flex-direction: row !important; gap: 0.4rem; cursor: pointer; font-weight: normal; min-width: auto; align-items: center; }
        .radio-group input { margin-top: 0; width: auto; }

        .dropdown-menu-wrap { position: relative; }
        .dropdown-toggle { background: #1565c0; color: #fff; border: none; border-radius: 5px; padding: 0.5rem 1rem; font-size: 0.95rem; cursor: pointer; font-weight: bold; transition: background 0.2s; white-space: nowrap; }
        .dropdown-toggle:hover { background: #0d47a1; }
        .dropdown-list { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 160px; list-style: none; margin: 0; padding: 0.3rem 0; z-index: 999; }
        .dropdown-list.open { display: block; }
        .dropdown-list li a { display: block; padding: 0.65rem 1.2rem; color: #1565c0; text-decoration: none; font-size: 0.95rem; font-weight: normal; margin: 0; white-space: nowrap; }
        .dropdown-list li a:hover { background: #e3f2fd; }
        .cdd-wrap { position: relative; flex: 1; min-width: 0; }
        .cdd-trigger { width: 100%; padding: 0.6rem 28px 0.6rem 0.6rem; border: 1px solid #ccc; border-radius: 5px; font-size: 0.88rem; font-family: 'Courier New', Courier, monospace; background: #fff; cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #333; display: block; line-height: 1.4; box-sizing: border-box; }
        .cdd-trigger:focus { outline: none; box-shadow: 0 0 0 2px #90caf9; }
        .cdd-trigger:disabled { background: #e9ecef; cursor: not-allowed; color: #adb5bd; }
        .cdd-arrow { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 11px; color: #888; }
        .cdd-list { display: none; position: absolute; left: 0; right: 0; top: calc(100% + 3px); background: #fff; border: 1px solid #ccc; border-radius: 5px; z-index: 9999; max-height: 300px; overflow-y: auto; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
        .cdd-list.open { display: block; }
        .cdd-item { padding: 7px 10px; cursor: pointer; font-family: 'Courier New', Courier, monospace; font-size: 0.88rem; border-bottom: 0.5px solid #f0f0f0; white-space: pre; }
        .cdd-item:last-child { border-bottom: none; }
        .cdd-item:hover, .cdd-item.cdd-selected { background: #e3f2fd; }
        .t-no   { color: #1565c0; font-weight: bold; }
        .t-sep  { color: #999; }
        .t-time { color: #2e7d32; }
        .t-dur  { color: #6a1e8a; }
        .t-discount { color: #e65100; font-weight: bold; }
        .t-pad  { color: transparent; user-select: none; }
        /* 標籤全名/簡稱切換 */
        .label-short { display: none; }
        .label-full  { display: inline; }

        @media (max-width: 768px) {
            .label-short { display: inline; }
            .label-full  { display: none; }
            header { font-size: 1.5rem; padding: 1rem 0; }
            .container { padding: 1.5rem 1rem; }
            .row-top { flex-direction: column; align-items: stretch; gap: 1rem; padding-bottom: 1rem; }
            .left-group { flex-direction: row; justify-content: space-between; width: 100%; gap: 0.5rem; }
            .left-group label { min-width: unset; flex: 1; }
            .left-group .mobile-label-hide { display: none; } 
            .left-group .secondary-btn { flex: 1; height: 40px; padding: 0 0.5rem; font-size: 0.85rem; }
            .right-group { width: 100%; }
            .right-group .label-horizontal { width: 100%; justify-content: space-between; }
            .row-bottom { flex-direction: column; align-items: stretch; gap: 0.8rem; }
            .row-bottom label { flex-direction: row !important; align-items: center; justify-content: space-between; width: 100%; min-width: unset; }
            .row-bottom label span { flex: 0 0 44px; margin-top: 0; }
            .row-bottom label input, .row-bottom label select { flex: 1; margin-top: 0; }
            .submit-btn { width: 100%; height: 50px; font-size: 1.1rem; margin-top: 1rem; }
            .col-id { display: none; }
        }
    </style>
</head>
<body>

<header>高鐵訂票系統</header>

<div class="container">
    <!-- 訂票任務頁面 -->
    <div id="booking-page">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #e3f2fd; padding-bottom: 0.5rem; margin-bottom: 1rem;">
            <h2 style="margin:0; border:none; padding:0;">新增訂票任務</h2>
            <div class="dropdown-menu-wrap">
                <button class="dropdown-toggle" onclick="toggleDropdown(event)">&#9776; 選單</button>
                <ul class="dropdown-list" id="site-dropdown">
                    <li><a href="/passenger.html">乘客個人資料</a></li>
                    <li><a href="/history.html">歷史訂票資訊</a></li>
                </ul>
            </div>
        </div>
        <form id="booking-form">
            <div class="form-row row-top">
                <div class="left-group">
                    <label class="label-horizontal">
                        <span class="mobile-label-hide">車廂種類</span>
                        <select name="seat_class">
                            <option value="標準車廂" selected>標準車廂</option>
                            <option value="商務車廂">商務車廂</option>
                        </select>
                    </label>
                    <label class="label-horizontal">
                        <span class="mobile-label-hide">座位偏好</span>
                        <select name="seat_option">
                            <option value="無座位偏好" selected>無座位偏好</option>
                            <option value="靠窗">靠窗</option>
                            <option value="走道">走道</option>
                        </select>
                    </label>
                    <button type="button" class="secondary-btn" id="swap-btn" onclick="swapStations()">起訖站互換</button>
                </div>
                <div class="right-group">
                    <label class="label-horizontal">
                        <span>搜尋方式</span>
                        <div class="radio-group">
                            <label><input type="radio" name="bookingMethod" value="radio31"> 時間</label>
                            <label><input type="radio" name="bookingMethod" value="radio33" checked> 車次</label>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-row row-bottom">
                <label class="label-horizontal">
                    <span class="label-full">出發站</span><span class="label-short">出發</span>
                    <select name="start_station">
                        <option value="南港">南港</option>
                        <option value="台北">台北</option>
                        <option value="板橋">板橋</option>
                        <option value="桃園">桃園</option>
                        <option value="新竹" selected>新竹</option>
                        <option value="苗栗">苗栗</option>
                        <option value="台中">台中</option>
                        <option value="彰化">彰化</option>
                        <option value="雲林">雲林</option>
                        <option value="嘉義">嘉義</option>
                        <option value="台南">台南</option>
                        <option value="左營">左營</option>
                    </select>
                </label>

                <label class="label-horizontal">
                    <span class="label-full">到達站</span><span class="label-short">到達</span>
                    <select name="end_station">
                        <option value="南港">南港</option>
                        <option value="台北" selected>台北</option>
                        <option value="板橋">板橋</option>
                        <option value="桃園">桃園</option>
                        <option value="新竹">新竹</option>
                        <option value="苗栗">苗栗</option>
                        <option value="台中">台中</option>
                        <option value="彰化">彰化</option>
                        <option value="雲林">雲林</option>
                        <option value="嘉義">嘉義</option>
                        <option value="台南">台南</option>
                        <option value="左營">左營</option>
                    </select>
                </label>

                <label class="label-horizontal">
                    <span class="label-full">乘車日期</span><span class="label-short">日期</span>
                    <input type="date" name="travel_date" id="travel-date-input" required>
                </label>

                <label class="label-horizontal">
                    <span class="label-full">乘車時間</span><span class="label-short">時間</span>
                    <select name="train_time" class="TimeTable">
                        <option selected="selected" value="">請選擇...</option>
                        <option value="00:00">00:00</option>
                        <option value="00:30">00:30</option>
                        <option value="05:00">05:00</option>
                        <option value="05:30">05:30</option>
                        <option value="06:00">06:00</option>
                        <option value="06:30">06:30</option>
                        <option value="07:00">07:00</option>
                        <option value="07:30">07:30</option>
                        <option value="08:00">08:00</option>
                        <option value="08:30">08:30</option>
                        <option value="09:00">09:00</option>
                        <option value="09:30">09:30</option>
                        <option value="10:00">10:00</option>
                        <option value="10:30">10:30</option>
                        <option value="11:00">11:00</option>
                        <option value="11:30">11:30</option>
                        <option value="12:00">12:00</option>
                        <option value="12:30">12:30</option>
                        <option value="13:00">13:00</option>
                        <option value="13:30">13:30</option>
                        <option value="14:00">14:00</option>
                        <option value="14:30">14:30</option>
                        <option value="15:00">15:00</option>
                        <option value="15:30">15:30</option>
                        <option value="16:00">16:00</option>
                        <option value="16:30">16:30</option>
                        <option value="17:00">17:00</option>
                        <option value="17:30">17:30</option>
                        <option value="18:00">18:00</option>
                        <option value="18:30">18:30</option>
                        <option value="19:00">19:00</option>
                        <option value="19:30">19:30</option>
                        <option value="20:00">20:00</option>
                        <option value="20:30">20:30</option>
                        <option value="21:00">21:00</option>
                        <option value="21:30">21:30</option>
                        <option value="22:00">22:00</option>
                        <option value="22:30">22:30</option>
                        <option value="23:00">23:00</option>
                        <option value="23:30">23:30</option>
                    </select>
                </label>

                <label class="label-horizontal" id="train-no-label">
                    <span class="label-full">車次</span><span class="label-short">車次</span>
                    <div style="display:flex; flex-direction:column; gap:4px; flex:1; min-width:220px;">
                        <div class="cdd-wrap" id="cddWrap">
                            <button type="button" class="cdd-trigger" id="cdd-trigger" disabled>
                                <span id="cdd-display" style="color:#adb5bd;">— 請先選擇出發站、到達站及日期 —</span>
                            </button>
                            <span class="cdd-arrow">▼</span>
                            <div class="cdd-list" id="cdd-list"></div>

                <label class="label-horizontal">
                    <span class="label-full">乘客姓名</span><span class="label-short">姓名</span>
                    <select name="name" id="passenger-select">
                        <option value="">載入中...</option>
                    </select>

                <label class="label-horizontal">
                    <span>張數</span>
                    <input type="number" name="ticket_count" value="1" min="1" max="10">

                <label class="label-horizontal">
                    <span class="label-full">訂票偏好</span><span class="label-short">重試</span>
                    <select name="retry_mode" id="retry-mode-select">
                        <option value="stop">失敗後停止訂票</option>
                        <option value="forever" selected>失敗後持續訂票</option>
                        <option value="30m">30分鐘內嘗試訂票</option>
                        <option value="1h">1小時內嘗試訂票</option>
                        <option value="2h">2小時內嘗試訂票</option>
                        <option value="4h">4小時內嘗試訂票</option>
                        <option value="8h">8小時內嘗試訂票</option>
                    </select>
                </label>

                <button type="submit" class="submit-btn">提交任務</button>
            </div>
        </form>

        <h3>訂票任務狀態</h3>
        
        <div class="table-container">
            <table id="task-table">
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th>姓名</th>
                        <th>訂票資訊</th>
                        <th style="min-width:44px;">狀態</th>
                        <th>訊息</th>
                        <th>提交時間</th>
                        <th>更新時間</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    <!-- 由 JavaScript 動態生成 -->
                </tbody>
            </table>
        </div>
        <br>
        <p class="archive-note">💡 已完成任務會在成功 2 天後、失敗/取消任務 60 分鐘後自動從此列表移除並歸檔到歷史紀錄。</p>
    </div>

</div>

<script>
    // 通用 URL 解析
    function getApiUrl(path) {
        if (path.startsWith('http')) return path;
        const origin = window.location.origin;
        if (!origin || origin === 'null' || origin.startsWith('blob:')) {
            return path.startsWith('/') ? path.substring(1) : path;
        }
        return new URL(path, origin).href;
    }

    const API_TASKS_URL = getApiUrl('/api/get_tasks');
    const API_SUBMIT_URL = getApiUrl('/api/submit_task');
    const API_PASSENGERS_URL = getApiUrl('/api/get_passengers');
    const API_CANCEL_URL = getApiUrl('/api/cancel_task');

    let statusTimer = null;

    function toggleDropdown(e) {
        e.stopPropagation();
        document.getElementById('site-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', function() {
        const dd = document.getElementById('site-dropdown');
        if (dd) dd.classList.remove('open');
    });

    // 頁面切換
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
    }

    // 起訖站互換
    function swapStations() {
        const startSelect = document.querySelector('select[name="start_station"]');
        const destSelect = document.querySelector('select[name="end_station"]');
        const temp = startSelect.value;
        startSelect.value = destSelect.value;
        destSelect.value = temp;
        const method = document.querySelector('input[name="bookingMethod"]:checked');
        if (method && method.value === 'radio33') loadTrainOptions();
    }

    // 搜尋方式與輸入框連動
    function initBookingMethodLogic() {
        const radios = document.querySelectorAll('input[name="bookingMethod"]');
        const trainTimeSelect = document.querySelector('select[name="train_time"]');
        const cddTrigger = document.getElementById('cdd-trigger');

        function updateInputs() {
            const checkedRadio = document.querySelector('input[name="bookingMethod"]:checked');
            if (!checkedRadio) return;
            const selected = checkedRadio.value;
            if (selected === 'radio31') {
                trainTimeSelect.disabled = false;
                cddTrigger.disabled = true;
                document.getElementById('train-no-value').value = '';
                document.getElementById('cdd-display').innerHTML = '<span style="color:#adb5bd;">— 請先查詢車次 —</span>';
                document.querySelectorAll('.cdd-item').forEach(i => i.classList.remove('cdd-selected'));
            } else {
                trainTimeSelect.disabled = true;
                cddTrigger.disabled = false;
                trainTimeSelect.value = '';
            }
        }
        radios.forEach(r => r.addEventListener('change', updateInputs));
        updateInputs();
    }

    // 自動觸發查詢：乘車日期、出發站、到達站任一變動時
    function initAutoTrainLoad() {
        const dateInput = document.getElementById('travel-date-input');
        const startSel  = document.querySelector('select[name="start_station"]');
        const endSel    = document.querySelector('select[name="end_station"]');

        function onTrigger() {
            const method = document.querySelector('input[name="bookingMethod"]:checked');
            if (method && method.value === 'radio33') loadTrainOptions();
        }
        dateInput.addEventListener('change', onTrigger);
        startSel.addEventListener('change', onTrigger);
        endSel.addEventListener('change', onTrigger);
    }

    // -----------------------------------------------------------------------
    // 自訂車次下拉元件
    // -----------------------------------------------------------------------
    function makeTrainHTML(t) {
        const prefix = t.has_discount
            ? `<span class="t-discount">* </span>`
            : `<span class="t-pad">* </span>`;
        return `${prefix}<span class="t-no">${t.train_no}</span><span class="t-sep">, </span><span class="t-time">${t.dep_time}-${t.arr_time}</span><span class="t-sep"> </span><span class="t-dur">(${t.duration_min}分)</span>`;
    }

    function cddToggle() {
        document.getElementById('cdd-list').classList.toggle('open');
    }

    function cddSelectTrain(t, el) {
        document.querySelectorAll('.cdd-item').forEach(i => i.classList.remove('cdd-selected'));
        el.classList.add('cdd-selected');
        document.getElementById('cdd-display').innerHTML = makeTrainHTML(t);
        document.getElementById('train-no-value').value = t.train_no;
        document.getElementById('cdd-list').classList.remove('open');
    }

    document.addEventListener('click', function(e) {
        const wrap = document.getElementById('cddWrap');
        if (wrap && !wrap.contains(e.target)) {
            document.getElementById('cdd-list').classList.remove('open');
        }
    });

    document.getElementById('cdd-trigger').addEventListener('click', function() {
        if (!this.disabled) cddToggle();
    });

    // -----------------------------------------------------------------------
    // 車次查詢：呼叫後端 /api/get_trains，全部班次直接顯示
    // -----------------------------------------------------------------------
    async function loadTrainOptions() {
        const startStation = document.querySelector('select[name="start_station"]').value;
        const endStation   = document.querySelector('select[name="end_station"]').value;
        const travelDate   = document.getElementById('travel-date-input').value;
        const cddList      = document.getElementById('cdd-list');
        const cddTrigger   = document.getElementById('cdd-trigger');
        const cddDisplay   = document.getElementById('cdd-display');

        if (!travelDate || !startStation || !endStation || startStation === endStation) return;

        cddList.innerHTML = '';
        cddTrigger.disabled = true;
        document.getElementById('train-no-value').value = '';
        cddDisplay.innerHTML = '<span style="color:#adb5bd;">查詢中，請稍候…</span>';

        try {
            const url = getApiUrl(
                `/api/get_trains?origin=${encodeURIComponent(startStation)}&destination=${encodeURIComponent(endStation)}&date=${travelDate}`
            );
            const res  = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();

            if (json.status !== 'success' || !Array.isArray(json.trains) || json.trains.length === 0) {
                cddDisplay.innerHTML = '<span style="color:#adb5bd;">查無班次，請確認日期及站別</span>';
                return;
            }

            json.trains.forEach(t => {
                const div = document.createElement('div');
                div.className = 'cdd-item';
                div.innerHTML = makeTrainHTML(t);
                div.addEventListener('click', () => cddSelectTrain(t, div));
                cddList.appendChild(div);
            });

            cddTrigger.disabled = false;
            cddDisplay.innerHTML = `<span style="color:#adb5bd;">— 請選擇車次（共 ${json.trains.length} 班）—</span>`;

        } catch (err) {
            cddDisplay.innerHTML = '<span style="color:#c62828;">查詢失敗，請重試</span>';
            console.error('loadTrainOptions error:', err);
        } finally {
            cddTrigger.disabled = false;
        }
    }

    // 設定預設日期為今天
    function setDefaultDate() {
        const dateInput = document.getElementById('travel-date-input');
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
    }

    // 載入乘客資料
    async function loadPassengers() {
        const select = document.getElementById('passenger-select');
        try {
            const res = await fetch(API_PASSENGERS_URL);
            const data = await res.json();
            
            select.innerHTML = '';
            if (!data || data.length === 0) {
                const opt = document.createElement('option');
                opt.value = "";
                opt.textContent = "請先新增乘客資料";
                select.appendChild(opt);
                return;
            }
            
            data.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id; 
                opt.textContent = p.name;
                opt.dataset.name = p.name;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error('載入乘客失敗:', err);
            select.innerHTML = '<option value="">載入失敗，請重整頁面</option>';
        }
    }

    // 計時器控制
    function updateInterval(enable) {
        if (enable) {
            if (statusTimer === null) {
                statusTimer = setInterval(fetchTasks, 5000);
            }
        } else {
            if (statusTimer !== null) {
                clearInterval(statusTimer);
                statusTimer = null;
            }
        }
    }

    // 更新任務狀態表格邏輯
    const TWO_DAYS_IN_MS = 2 * 24 * 60 * 60 * 1000;

    async function fetchTasks() {
        const tbody = document.getElementById('task-table-body');
        if (!tbody) return;

        try {
            const res = await fetch(API_TASKS_URL);
            if (!res.ok) throw new Error('API 回傳失敗');
            const json = await res.json();

            // API 回傳格式: { status, worker_status, tasks: [...] }
            const tasks = json.tasks;

            tbody.innerHTML = '';

            // 確保 tasks 是個陣列
            if (!Array.isArray(tasks)) {
                const errorMessage = json.message || `API 返回資料格式錯誤: ${JSON.stringify(json)}`;
                console.error('API Error:', errorMessage, json);
                tbody.innerHTML = `<tr><td colspan="8" style="color:#dc3545; font-weight:bold;">無法載入狀態資訊: ${errorMessage}</td></tr>`;
                updateInterval(false);
                return;
            }

            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">目前沒有進行中的訂票任務。</td></tr>';
                updateInterval(false);
                return;
            }

            // default 設為 false，只要有 pending/running/cancelling 才設為 true
            let newActiveTasks = false;
            const nowTime = new Date().getTime();

            tasks.forEach(task => {
                const status = task.status || 'unknown';

                // 檢查是否有 pending / running / cancelling 任務，若有則持續更新
                if (status === 'pending' || status === 'running' || status === 'cancelling') {
                    newActiveTasks = true;
                }

                // --- 根據 submit_time 過濾超過 2 天的任務 ---
                const submitTimeStr = task.submit_time;
                if (submitTimeStr) {
                    try {
                        // 'YYYY/MM/DD HH:MM:SS' → ISO 格式以確保跨瀏覽器相容
                        const isoTimeStr = submitTimeStr.replace(/\//g, '-').replace(' ', 'T');
                        const submitTimeMs = new Date(isoTimeStr).getTime();
                        if (nowTime - submitTimeMs > TWO_DAYS_IN_MS) {
                            console.log(`Task ${task.id} submitted over 2 days ago, skipping display.`);
                            return; // continue (跳過此筆)
                        }
                    } catch (e) {
                        console.error('Invalid submit_time format:', submitTimeStr);
                    }
                }

                // --- 狀態中文標籤 ---
                const retryCount = task.retry_count || 0;
                const retryMode  = task.retry_mode  || 'stop';

                let statusLabel = status;
                if      (status === 'running')          statusLabel = retryCount > 0 ? '重試中' : '訂票中';
                else if (status === 'pending')          statusLabel = retryCount > 0 ? '等待重試' : '等待中';
                else if (status === 'cancelling')       statusLabel = '取消中';
                else if (status === 'booking_success')  statusLabel = '成功';
                else if (status === 'booking_failed')   statusLabel = '失敗';
                else if (status === 'task_aborted')     statusLabel = '終止';
                else if (status === 'task_cancelled')   statusLabel = '取消';
                else if (status === 'task_deleted')     statusLabel = '任務刪除';
                else if (status === 'unknown_result')   statusLabel = '不明原因終止';

                // 重試次數 badge（有重試過才顯示）
                let retryBadge = '';
                if (retryCount > 0) {
                    const modeLabel = {
                        'forever': '持續', '30m': '30分鐘', '1h': '1小時',
                        '2h': '2小時', '4h': '4小時', '8h': '8小時'
                    }[retryMode] || '';
                    // retryBadge = `<br><small style="color:#e65100; font-weight:bold;">第${retryCount}次重試${modeLabel ? '（' + modeLabel + '）' : ''}</small>`;
                    retryBadge = `<br><small style="color:#e65100; font-weight:bold;">${modeLabel ? '(' + modeLabel + ')' : ''}</small>`;
                }

                // --- 解析 train_info 欄位 ---
                // 格式: 從 [起站] 到 [訖站] (YYYY/MM/DD HH:MM TTTT)
                let bookingInfo = task.train_info || '-';
                const match = task.train_info
                    ? task.train_info.match(/從\s*([^到]+)\s*到\s*([^ (]+)\s*\(([^ )]+)\s*([0-9:]+)\s*([^)]*)\)/)
                    : null;

                if (match) {
                    const start_station = match[1].trim();
                    const end_station   = match[2].trim();
                    const train_time    = match[4].trim();
                    const train_no      = match[5].trim();

                    // 日期格式轉換: YYYY-MM-DD 或 YYYY/MM/DD → MM/DD
                    let travel_date = match[3].trim();
                    if (travel_date !== 'N/A') {
                        const parts = travel_date.includes('-') ? travel_date.split('-') : travel_date.split('/');
                        if (parts.length === 3) travel_date = `${parts[1]}/${parts[2]}`;
                    }

                    const train_no_str = train_no ? ` - ${train_no}` : '';
                    bookingInfo = `${start_station} → ${end_station} (${travel_date} ${train_time}${train_no_str})`;
                }

                // --- 訊息欄：[第N次重試] 橘色粗體 + 主訊息 + 上次失敗原因灰字 ---
                const rawMessage     = task.message          || '等待中...';
                const lastFailReason = task.last_fail_reason || '';
                const isActive   = (status === 'running' || status === 'pending' || status === 'cancelling');
                const isFinished = ['booking_success','booking_failed','task_cancelled','task_aborted','unknown_result'].includes(status);

                let messageHtml = '';
                if (retryCount > 0 && isActive) {
                    messageHtml += `<span style="color:#e65100;font-weight:bold;">[第&nbsp;${retryCount}&nbsp;次重試]</span>&nbsp;`;
                }
                messageHtml += rawMessage;
                if (lastFailReason && !isFinished) {
                    messageHtml += `<br><small style="color:#9e9e9e;">&#x26A0;&nbsp;上次失敗：${lastFailReason}</small>`;
                }

                // --- 提交/更新時間：只顯示時間部分 (HH:MM:SS) ---
                const submitTime = task.submit_time ? task.submit_time.split(' ')[1] : '—';
                const updateTime = task.update_time ? task.update_time.split(' ')[1] : '—';

                // --- 操作按鈕 ---
                let actionBtn = '—';
                if (status === 'pending') {
                    actionBtn = `<button class="secondary-btn" style="height:30px; padding:2px 10px; font-size:0.8rem;" onclick="cancelTask('${task.id}')">取消</button>`;
                } else if (status === 'running' || status === 'cancelling') {
                    actionBtn = `<button class="secondary-btn" style="height:30px; padding:2px 10px; font-size:0.8rem;" onclick="cancelTask('${task.id}')">放棄</button>`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-id"><code>${task.id}</code></td>
                    <td>${task.passenger_name || '未指定'}</td>
                    <td>${bookingInfo}</td>
                    <td><span class="status-${status}">${statusLabel}</span>${retryBadge}</td>
                    <td>${messageHtml}</td>
                    <td><small>${submitTime}</small></td>
                    <td><small>${updateTime}</small></td>
                    <td>${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });

            updateInterval(newActiveTasks);

        } catch (err) {
            console.error('獲取任務失敗:', err);
            tbody.innerHTML = '<tr><td colspan="8" style="color:#dc3545; font-weight:bold;">無法載入狀態資訊：網路或伺服器連線錯誤。</td></tr>';
            updateInterval(false);
        }
    }

    // 取消任務
    async function cancelTask(id) {
        if(!confirm('確定要取消此任務嗎？')) return;
        try {
            await fetch(`${API_CANCEL_URL}/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });
            fetchTasks();
        } catch (e) {
            console.error('取消任務失敗:', e);
        }
    }

    // 表單提交邏輯
    document.getElementById('booking-form').onsubmit = async function(e) {
        e.preventDefault();
        const form = e.target;
        
        const bookingMethod = form.querySelector('input[name="bookingMethod"]:checked').value;
        const name_select = document.getElementById('passenger-select');
        const selectedOption = name_select.options[name_select.selectedIndex];

        if (!selectedOption || selectedOption.value === "" || 
            selectedOption.text === "載入中..." || 
            selectedOption.text === "請先新增乘客資料") {
            alert("請先前往 '乘客個人資料' 頁面新增乘客資料，否則無法提交訂票任務。");
            return;
        }

        if(!form.travel_date.value) { alert('請選擇乘車日期'); return; }
        
        if(bookingMethod === 'radio31') {
            if (!form.train_time.value) {
                alert('請選擇乘車時間');
                return;
            }
            // 檢查 HH:MM 格式
            if (!/^\d{1,2}:\d{2}$/.test(form.train_time.value)) {
                alert('乘車時間格式錯誤，請使用 HH:MM（例如 09:00）。');
                return;
            }
        }

        if(bookingMethod === 'radio33') {
            const trainNoVal = document.getElementById('train-no-value').value;
            if (!trainNoVal) {
                alert('車次模式請從下拉選單選擇車次（點 🔍 查詢）');
                return;
            }
        }

        const data = {
            bookingMethod: bookingMethod,
            start_station: form.start_station.value,
            end_station: form.end_station.value,
            travel_date: form.travel_date.value,
            train_time: form.train_time.value,
            train_no: document.getElementById('train-no-value').value,
            seat_class: form.seat_class.value,
            seat_option: form.seat_option.value,
            passenger_internal_id: selectedOption.value,
            name: selectedOption.dataset.name,
            retry_mode: form.retry_mode.value
        };

        try {
            const res = await fetch(API_SUBMIT_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.status === 'success') {
                // alert('任務提交成功！');
                fetchTasks(); 
            } else {
                alert('錯誤: ' + (result.message || '提交失敗'));
            }
        } catch (err) {
            alert('提交時發生通訊錯誤');
        }
    };

    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
        initBookingMethodLogic();
        initAutoTrainLoad();
        setDefaultDate();
        loadTrainOptions();
        await loadPassengers();
        await fetchTasks();
    });
</script>
