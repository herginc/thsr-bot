<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>乘客個人資料</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: "Noto Sans TC", Arial, sans-serif; background: #f7f7fa; margin: 0; padding: 0; }
        header { background: #1565c0; color: #fff; padding: 1.2rem 0; text-align: center; font-size: 1.5rem; margin-bottom: 1.5rem; }
        .container { max-width: 700px; width: 95%; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px #ddd; padding: 1.5rem; }
        h2 { color: #1565c0; margin-top: 0; }

        /* 表單：桌機多欄，手機單欄 */
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem 1.5rem; margin-bottom: 1.5rem; align-items: end; }
        form label { display: flex; flex-direction: column; font-weight: bold; color: #333; font-size: 1rem; }
        form input, form select { padding: 0.55rem 0.7rem; border: 1px solid #bbb; border-radius: 5px; font-size: 1rem; margin-top: 0.3rem; width: 100%; box-sizing: border-box; }
        form button { grid-column: 1 / -1; background: #1565c0; color: #fff; border: none; border-radius: 5px; padding: 0.75rem; font-size: 1.1rem; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; width: 100%; }
        form button:hover { background: #003c8f; }

        /* 乘客列表：水平捲軸 */
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #eee; border-radius: 5px; margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: #fafbfc; font-size: 0.9rem; min-width: 520px; }
        th, td { border-bottom: 1px solid #e0e0e0; padding: 0.65rem 0.6rem; text-align: left; white-space: nowrap; }
        th { background: #e3f2fd; color: #1565c0; font-weight: bold; }
        tr:nth-child(even) td { background: #f9f9f9; }

        .alert { padding: 0.75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: 0.25rem; font-weight: bold; }
        .success-alert { color: #155724; background-color: #d4edda; border-color: #c3e6cb; }
        .error-alert { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }

        @media (max-width: 600px) {
            header { font-size: 1.2rem; padding: 0.9rem 0; }
            .container { padding: 1rem 0.85rem; }
            .page-title { font-size: 1.6rem !important; }
            form { grid-template-columns: 1fr; gap: 0.7rem; }
            form button { font-size: 1.05rem; padding: 0.8rem; margin-top: 0.3rem; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header>乘客個人資料</header>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #e3f2fd; padding-bottom: 0.5rem; margin-bottom: 1rem;">
            <h2 class="page-title" style="margin:0; border:none; padding:0;">新增乘客資料</h2>
            <a href="/" style="display:inline-block; margin:0; background:#1565c0; color:#fff; padding:0.5rem 1rem; border-radius:5px; font-size:0.95rem; text-decoration:none; font-weight:bold; white-space:nowrap;">&#8592; 回首頁</a>
        </div>
        {% if success %}
        <div class="alert success-alert">✅ 乘客新增成功！</div>
        {% endif %}
        {% if error %}
        <div class="alert error-alert">❌ {{ error }}</div>
        {% endif %}
        <form method="post">
            <label>
                姓名
                <input name="name" required autocomplete="off">
            </label>
            <label>
                身份證字號
                <input name="personal_id" required autocomplete="off">
            </label>
            <label>
                手機號碼
                <input name="phone_num" required autocomplete="off">
            </label>
            <label>
                郵件信箱
                <input name="email" required autocomplete="off">
            </label>
            <label>
                身份
                <select name="identity" required>
                    <option value="一般">一般</option>
                    <option value="學生">學生</option>
                    <option value="老人">老人</option>
                    <option value="孩童">孩童</option>
                </select>
            </label>
            <button type="submit">新增</button>
        </form>
        <h2>乘客資料列表</h2>
        <div class="table-container">
        <table>
            <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>身份證字號</th>
                <th>手機號碼</th>
                <th>郵件信箱</th>
                <th>身份</th>
            </tr>
            {% for p in passengers %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.name }}</td>
                <td>{{ p.personal_id }}</td>
                <td>{{ p.phone_num }}</td>
                <td>{{ p.email }}</td>
                <td>{{ p.identity }}</td>
            </tr>
            {% endfor %}
        </table>
        </div>
    </div>
</body>
</html>
